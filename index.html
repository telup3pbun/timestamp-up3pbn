<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Timestamp Pro</title>

<style>
body{
    margin:0;
    background:black;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Font lebih modern */
    overflow:hidden;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
    transform-origin:center;
}

#timestamp{
    position:absolute;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.6); /* Transparan */
    color:#00ff00; /* Hijau limau */
    padding:15px;
    border-radius:12px;
    font-size:14px;
    max-width:90%;
    backdrop-filter: blur(5px); /* Efek buram latar belakang */
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    pointer-events: none; /* Klik tidak menghalangi video */
    line-height: 1.5; /* Spasi baris */
}

.controls{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00ff00;
    color: #000;
    cursor:pointer;
    font-weight:bold;
    display: flex;
    align-items: center;
    gap: 5px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    transition: transform 0.1s;
}

button:active {
    transform: scale(0.95);
}

.btn-icon {
    font-size: 1.2rem;
}

input[type=range]{
    width:150px;
    accent-color: #00ff00;
}

#previewContainer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index: 10;
}

#previewContainer img{
    max-width:90%;
    max-height:70%;
    border-radius:12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.7);
}

.preview-buttons{
    margin-top:20px;
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="controls">
    🔍 <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">
    <button onclick="ambilFoto()">
        <span class="btn-icon">📸</span> <span class="btn-text">Ambil Foto</span>
    </button>
</div>

<div id="timestamp">Memuat lokasi...</div>

<div id="previewContainer">
    <img id="previewImage">
    <div class="preview-buttons">
        <button onclick="downloadFoto()" style="background-color: #007bff; color: white;">
             <span class="btn-icon">⬇</span> Download JPG
        </button>
        <button onclick="tutupPreview()" style="background-color: #ffc107; color: black;">
             <span class="btn-icon">❌</span> Batal
        </button>
    </div>
</div>

<script>
// Variabel data timestamp
let timestampDataLines = []; 
let latitude = "";
let longitude = "";
let alamatLengkap = "Mencari alamat...";
let fotoDataURL = "";

const video = document.getElementById("video");
const timestamp = document.getElementById("timestamp");
const zoomSlider = document.getElementById("zoomSlider");

// AKTIFKAN KAMERA
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    video.srcObject = stream;
})
.catch(() => alert("Kamera tidak bisa diakses"));

// ZOOM DIGITAL PADA TAMPILAN VIDEO
zoomSlider.addEventListener("input", function(){
    video.style.transform = `scale(${this.value})`;
});

// GPS - AMBIL LOKASI
navigator.geolocation.getCurrentPosition(function(position){
    latitude = position.coords.latitude;
    longitude = position.coords.longitude;

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
    .then(res => res.json())
    .then(data => {
        alamatLengkap = data.display_name || "Alamat tidak ditemukan";
    })
    .catch(() => alamatLengkap = "Gagal memuat alamat");
}, function(error) {
    alamatLengkap = "Akses GPS ditolak/gagal";
});

// UPDATE TAMPILAN WAKTU SECARA REAL-TIME
setInterval(() => {
    const now = new Date();
    const tanggal = now.toLocaleDateString('id-ID');
    const waktu = now.toLocaleTimeString('id-ID');

    // Susun data dalam array untuk mempermudah penggambaran di canvas nanti
    timestampDataLines = [
        `📅 ${tanggal}`,
        `⏰ ${waktu}`,
        `📍 ${alamatLengkap}`,
        `🌍 ${latitude}, ${longitude}`
    ];

    // Tampilkan di HTML live preview dengan <br>
    timestamp.innerHTML = timestampDataLines.join('<br>');
}, 1000);

// AMBIL FOTO & GAMBAR KE CANVAS
function ambilFoto(){
    if(!video.videoWidth) return alert("Kamera belum siap.");

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");

    // Hitung zoom agar sesuai hasil video
    const scale = parseFloat(zoomSlider.value);
    const w = canvas.width / scale;
    const h = canvas.height / scale;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;

    // Gambar frame video ke canvas
    ctx.drawImage(video, x, y, w, h, 0, 0, canvas.width, canvas.height);

    // Pengaturan Teks & Latar Belakang Teks di Canvas (Agar terbaca)
    const fontSize = Math.floor(canvas.height * 0.03); // Ukuran font proporsional ~3% dari tinggi foto
    const padding = fontSize * 0.8;
    const lineHeight = fontSize * 1.5;
    const startX = 20;
    
    // Pecah teks alamat agar tidak terlalu panjang jika ada alamat yang sangat detail
    // (Fungsi ini bersifat opsional tapi bagus untuk keamanan visual)
    const processedLines = [];
    timestampDataLines.forEach(line => {
        // Jika baris alamat sangat panjang, coba pecah
        if(line.length > 50 && line.startsWith('📍')) {
             const limit = 45;
             const splitIndex = line.lastIndexOf(', ', limit);
             if (splitIndex > 30) {
                 processedLines.push(line.substring(0, splitIndex + 1));
                 processedLines.push('📍 ' + line.substring(splitIndex + 2));
             } else {
                 processedLines.push(line); // Fallback: tidak bisa dipisah secara rapi
             }
        } else {
            processedLines.push(line);
        }
    });
    
    // Hitung total tinggi background berdasarkan jumlah baris
    const totalTextHeight = processedLines.length * lineHeight;
    const backgroundHeight = totalTextHeight + (padding * 2);
    const startY = canvas.height - backgroundHeight - 20;

    // Gambar kotak latar belakang transparan
    ctx.fillStyle = "rgba(0,0,0,0.6)"; // Gelap transparan
    // Hitung lebar maksimal teks untuk menyesuaikan lebar background
    ctx.font = `${fontSize}px Arial`;
    let maxTextWidth = 0;
    processedLines.forEach(line => {
        const textMetrics = ctx.measureText(line);
        if(textMetrics.width > maxTextWidth) maxTextWidth = textMetrics.width;
    });
    const backgroundWidth = maxTextWidth + (padding * 2);
    
    // ctx.roundRect ? ctx.roundRect(startX, startY, backgroundWidth, backgroundHeight, 15) : ctx.fillRect(startX, startY, backgroundWidth, backgroundHeight); // Pilihan untuk sudut melengkung jika didukung browser
    ctx.fillRect(startX, startY, backgroundWidth, backgroundHeight); // Fallback simple

    // Gambar teks baris demi baris di atas background
    ctx.fillStyle = "#00ff00"; // Warna teks hijau limau
    ctx.textBaseline = "top";
    processedLines.forEach((baris, index) => {
        ctx.fillText(baris, startX + padding, startY + padding + (index * lineHeight));
    });

    // Ubah canvas menjadi data URL
    fotoDataURL = canvas.toDataURL("image/jpeg", 0.9);

    // Tampilkan di preview
    document.getElementById("previewImage").src = fotoDataURL;
    document.getElementById("previewContainer").style.display = "flex";
}

// DOWNLOAD
function downloadFoto(){
    if(!fotoDataURL) return;
    const link = document.createElement("a");
    const namaFile = `Foto_Timestamp_${new Date().getTime()}.jpg`; // Nama file unik
    link.download = namaFile;
    link.href = fotoDataURL;
    link.click();
}

// TUTUP PREVIEW
function tutupPreview(){
    document.getElementById("previewContainer").style.display = "none";
}
</script>
</body>
</html>
