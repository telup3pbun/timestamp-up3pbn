<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Timestamp Pro HD - PBN</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
    transform-origin:center;
}

#timestamp{
    position:absolute;
    bottom:20px;
    left:20px;
    background:rgba(0,0,0,0.6);
    color:#00ff00;
    padding:15px;
    border-radius:10px;
    font-size:14px;
    max-width:90%;
    line-height: 1.5;
    z-index: 5;
}

.controls{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap: wrap; 
    z-index: 10;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#00ff00;
    color: #000;
    cursor:pointer;
    font-weight:bold;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

button:active {
    transform: scale(0.95);
}

input[type=range]{
    width:120px; 
}

#previewContainer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index: 20;
}

#previewContainer img{
    max-width:95%;
    max-height:75%;
    border: 2px solid #00ff00;
    border-radius:10px;
}

.preview-buttons{
    margin-top:20px;
    display:flex;
    gap:20px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div class="controls">
    <span style="color:white; font-size:12px;">ZOOM</span>
    <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1">
    <button onclick="ambilFoto()">📸 AMBIL FOTO HD</button>
    <button onclick="balikKamera()">🔄 BALIK</button>
</div>

<div id="timestamp" style="white-space: pre-wrap;">
<b style="color:yellow;">Pekerjaan LM 1 dan LM 2 PBN</b>
Memuat lokasi HD...</div>

<div id="previewContainer">
    <img id="previewImage">
    <div class="preview-buttons">
        <button onclick="downloadFoto()" style="background:#2ecc71; color:white;">⬇ SIMPAN HD (JPG)</button>
        <button onclick="tutupPreview()" style="background:#e74c3c; color:white;">❌ BATAL</button>
    </div>
</div>

<script>
let latitude = "";
let longitude = "";
let alamatLengkap = "Mencari lokasi...";
let fotoDataURL = "";
let currentStream = null;
let currentFacingMode = "environment"; 

const video = document.getElementById("video");
const timestamp = document.getElementById("timestamp");
const zoomSlider = document.getElementById("zoomSlider");

// FUNGSI KAMERA DENGAN RESOLUSI HD
function mulaiKamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    // Meminta resolusi ideal 1920x1080 (Full HD)
    const constraints = {
        video: { 
            facingMode: currentFacingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
    };

    navigator.mediaDevices.getUserMedia(constraints)
    .then(stream => {
        currentStream = stream;
        video.srcObject = stream;
    })
    .catch(err => {
        alert("Gagal mengakses kamera HD. Pastikan izin diberikan.");
    });
}

function balikKamera() {
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    zoomSlider.value = 1;
    video.style.transform = `scale(1)`;
    mulaiKamera();
}

mulaiKamera();

zoomSlider.addEventListener("input", function(){
    video.style.transform = `scale(${this.value})`;
});

// GPS
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        function(position){
            latitude = position.coords.latitude;
            longitude = position.coords.longitude;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
            .then(res => res.json())
            .then(data => {
                alamatLengkap = data.display_name || "Alamat tidak ditemukan";
            })
            .catch(() => alamatLengkap = "Gagal memuat alamat");
        }, 
        function(error) { alamatLengkap = "GPS tidak aktif"; },
        { enableHighAccuracy: true }
    );
}

setInterval(() => {
    const now = new Date();
    const tgl = now.toLocaleDateString('id-ID');
    const wkt = now.toLocaleTimeString('id-ID');
    timestamp.innerHTML = `<b style="color:yellow;">Pekerjaan LM 1 dan LM 2 PBN</b>\n📅 ${tgl}\n⏰ ${wkt}\n📍 ${alamatLengkap}\n🌍 ${latitude}, ${longitude}`;
}, 1000);

// FUNGSI AMBIL FOTO HD DENGAN OPTIMASI CANVAS
function ambilFoto(){
    if(!video.videoWidth) return alert("Kamera belum siap.");

    const canvas = document.createElement("canvas");
    // Gunakan resolusi asli kamera (HD) bukan resolusi layar
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");

    // Gambar dengan kualitas tinggi
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    const scale = parseFloat(zoomSlider.value);
    const w = canvas.width / scale;
    const h = canvas.height / scale;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;

    ctx.drawImage(video, x, y, w, h, 0, 0, canvas.width, canvas.height);

    // Pengaturan Teks Skala Besar (Sesuai HD)
    const fontSize = Math.max(30, Math.floor(canvas.height * 0.025)); 
    const padding = 35;
    const lineHeight = fontSize * 1.5;
    const maxWidth = canvas.width * 0.85; 
    const xPos = 50;
    
    const lines = [];
    lines.push("Pekerjaan LM 1 dan LM 2 PBN"); 
    
    const rawData = timestamp.innerText.replace("Pekerjaan LM 1 dan LM 2 PBN", "").trim();
    const rawLines = rawData.split('\n');

    ctx.font = `bold ${fontSize}px Arial`;
    rawLines.forEach(line => {
        let words = line.trim().split(' ');
        let currentLine = '';
        for (let n = 0; n < words.length; n++) {
            let testLine = currentLine + words[n] + ' ';
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                lines.push(currentLine);
                currentLine = words[n] + ' ';
            } else {
                currentLine = testLine;
            }
        }
        lines.push(currentLine);
    });

    // Background Kotak
    const bgHeight = (lines.length * lineHeight) + (padding * 2);
    const bgY = canvas.height - bgHeight - 60;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    if (ctx.roundRect) {
        ctx.beginPath();
        ctx.roundRect(xPos - 20, bgY, maxWidth + 40, bgHeight, 20);
        ctx.fill();
    } else {
        ctx.fillRect(xPos - 20, bgY, maxWidth + 40, bgHeight);
    }

    // Gambar Teks
    ctx.textBaseline = "top";
    lines.forEach((line, index) => {
        if(index === 0) {
            ctx.fillStyle = "yellow";
            ctx.font = `bold ${fontSize + 10}px Arial`;
        } else {
            ctx.fillStyle = "#00ff00";
            ctx.font = `bold ${fontSize}px Arial`;
        }
        ctx.fillText(line.trim(), xPos, bgY + padding + (index * lineHeight));
    });

    // Output Kualitas Maksimal (1.0 = Tanpa Kompresi)
    fotoDataURL = canvas.toDataURL("image/jpeg", 1.0);
    document.getElementById("previewImage").src = fotoDataURL;
    document.getElementById("previewContainer").style.display = "flex";
}

function downloadFoto(){
    if(!fotoDataURL) return;
    const link = document.createElement("a");
    link.download = `PBN_HD_${new Date().getTime()}.jpg`;
    link.href = fotoDataURL;
    link.click();
}

function tutupPreview(){
    document.getElementById("previewContainer").style.display = "none";
}
</script>
</body>
</html>
