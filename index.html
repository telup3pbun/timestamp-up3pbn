<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camera Timestamp Pro - Modern UI with Bottom Border</title>

<style>
:root {
    --primary-color: #00ff00;
}

body {
    margin: 0;
    background: #000;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
}

.camera-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    transition: transform 0.2s ease-out;
}

/* Watermark Real-time di Layar */
#timestamp {
    position: absolute;
    top: 50px;
    left: 20px;
    color: #fff;
    font-size: 12px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    z-index: 2;
    pointer-events: none;
    line-height: 1.4;
}

/* Penyesuaian Style: Border Bawah */
#timestamp::after {
    content: "";
    display: block;
    width: 60px; /* Lebar border sedikit */
    height: 2px; /* Tebal border */
    background-color: rgba(255, 255, 255, 0.5); /* Warna border sedikit transparan */
    margin-top: 5px; /* Jarak dari teks */
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5); /* Sedikit bayangan */
}

/* Container Zoom Slider Modern */
.zoom-container {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 300px;
    background: rgba(40, 40, 40, 0.6);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 3;
    border: 1px solid rgba(255,255,255,0.1);
}

.zoom-icon {
    color: white;
    font-size: 14px;
    font-weight: bold;
    min-width: 25px;
}

input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    background: rgba(255, 255, 255, 0.2);
    height: 4px;
    border-radius: 2px;
    outline: none;
}

input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    background: #fff;
    border: 2px solid var(--primary-color);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* Bottom Bar */
.bottom-bar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 140px;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 3;
}

.shutter-btn {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 50%;
    border: 6px solid rgba(255,255,255,0.2);
    cursor: pointer;
}

.shutter-btn:active {
    transform: scale(0.92);
}

.side-btn {
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    border: none;
}

.gallery-preview {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    background: #222;
    background-size: cover;
    background-position: center;
    border: 2px solid rgba(255,255,255,0.3);
}

/* Focus Ring */
#focusRing {
    position: absolute;
    width: 70px;
    height: 70px;
    border: 2px solid yellow;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    display: none;
    z-index: 10;
}

/* Modal Preview */
#previewContainer {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

#previewImage {
    max-width: 100%;
    max-height: 75vh;
    object-fit: contain;
}

.preview-actions {
    margin-top: 30px;
    display: flex;
    gap: 20px;
}

.action-btn {
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
}
</style>
</head>

<body onclick="handleFocus(event)">

<div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <div id="focusRing"></div>

    <div id="timestamp">
        <span style="color:yellow; font-weight:bold; font-size: 14px;">Pekerjaan LM 1 dan LM 2 PBN</span><br>
        <span id="liveData">Mencari GPS...</span>
    </div>

    <div class="zoom-container">
        <span class="zoom-icon">1x</span>
        <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1">
        <span class="zoom-icon" id="zoomVal">5x</span>
    </div>

    <div class="bottom-bar">
        <div class="gallery-preview" id="galleryThumb" onclick="tutupPreview(false)"></div>
        <button class="shutter-btn" onclick="ambilFoto()"></button>
        <button class="side-btn" onclick="balikKamera()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M7 7h10v3l4-4-4-4v3H5c-1.1 0-2 .9-2 2v7h2V7zm10 10H7v-3l-4 4 4 4v-3h12c1.1 0 2-.9 2-2V9h-2v7z"/></svg>
        </button>
    </div>
</div>

<div id="previewContainer">
    <img id="previewImage">
    <div class="preview-actions">
        <button class="action-btn" style="background:#00ff00; color:#000;" onclick="downloadFoto()">SIMPAN HD</button>
        <button class="action-btn" style="background:#333; color:#fff;" onclick="tutupPreview(true)">BATAL</button>
    </div>
</div>

<script>
let latitude = "-";
let longitude = "-";
let alamat = "Mencari lokasi...";
let fotoDataURL = "";
let currentStream = null;
let currentFacingMode = "environment";

const video = document.getElementById("video");
const liveData = document.getElementById("liveData");
const focusRing = document.getElementById("focusRing");
const zoomSlider = document.getElementById("zoomSlider");

function mulaiKamera() {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    navigator.mediaDevices.getUserMedia({
        video: { 
            facingMode: currentFacingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
    }).then(stream => {
        currentStream = stream;
        video.srcObject = stream;
    });
}

// Event Listener Slider Zoom
zoomSlider.addEventListener("input", function() {
    video.style.transform = `scale(${this.value})`;
});

function balikKamera() {
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    zoomSlider.value = 1;
    video.style.transform = "scale(1)";
    mulaiKamera();
}

function handleFocus(e) {
    if(e.target.type === 'range') return;
    focusRing.style.left = e.pageX + 'px';
    focusRing.style.top = e.pageY + 'px';
    focusRing.style.display = 'block';
    setTimeout(() => focusRing.style.display = 'none', 800);
}

if (navigator.geolocation) {
    navigator.geolocation.watchPosition(p => {
        latitude = p.coords.latitude;
        longitude = p.coords.longitude;
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
            .then(r => r.json()).then(d => alamat = d.display_name || "Alamat tidak ditemukan");
    }, null, { enableHighAccuracy: true });
}

setInterval(() => {
    const now = new Date();
    liveData.innerHTML = `📅 ${now.toLocaleDateString('id-ID')} | ⏰ ${now.toLocaleTimeString('id-ID')}<br>📍 ${alamat}<br>🌍 ${latitude}, ${longitude}`;
}, 1000);

function ambilFoto() {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingQuality = 'high';

    const zoom = parseFloat(zoomSlider.value);
    const w = canvas.width / zoom;
    const h = canvas.height / zoom;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;
    ctx.drawImage(video, x, y, w, h, 0, 0, canvas.width, canvas.height);

    const fs = Math.max(30, Math.floor(canvas.height * 0.025));
    ctx.font = `bold ${fs}px Arial`;
    
    const maxWidth = canvas.width * 0.85;
    const lines = ["Pekerjaan LM 1 dan LM 2 PBN"];
    const rawLines = `📅 ${new Date().toLocaleDateString('id-ID')} | ⏰ ${new Date().toLocaleTimeString('id-ID')}\n📍 ${alamat}\n🌍 ${latitude}, ${longitude}`.split('\n');
    
    rawLines.forEach(l => {
        let words = l.split(' '), cur = '';
        words.forEach(w => {
            if (ctx.measureText(cur + w).width > maxWidth) { lines.push(cur.trim()); cur = w + ' '; }
            else cur += w + ' ';
        });
        lines.push(cur.trim());
    });

    const bgH = (lines.length * (fs * 1.5)) + 60;
    const bgY = canvas.height - bgH - 60;

    // Background Teks
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(40, bgY, maxWidth + 40, bgH);

    // Penambahan Border Bawah Sedikit pada Canvas
    ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
    ctx.fillRect(40, bgY + bgH, maxWidth + 40, 2); // Border tipis di bawah background teks

    ctx.textBaseline = "top";
    lines.forEach((l, i) => {
        ctx.fillStyle = i === 0 ? "yellow" : "#00ff00";
        ctx.font = i === 0 ? `bold ${fs+8}px Arial` : `bold ${fs}px Arial`;
        ctx.fillText(l, 60, bgY + 30 + (i * fs * 1.5));
    });

    fotoDataURL = canvas.toDataURL("image/jpeg", 1.0);
    document.getElementById("previewImage").src = fotoDataURL;
    document.getElementById("galleryThumb").style.backgroundImage = `url(${fotoDataURL})`;
    document.getElementById("previewContainer").style.display = "flex";
}

function downloadFoto() {
    const a = document.createElement("a");
    a.href = fotoDataURL;
    a.download = `PBN_HD_${Date.now()}.jpg`;
    a.click();
}

function tutupPreview(isBatal) {
    document.getElementById("previewContainer").style.display = isBatal ? "none" : (fotoDataURL ? "flex" : "none");
}

mulaiKamera();
</script>
</body>
</html>
