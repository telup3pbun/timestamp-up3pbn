<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camera Pekerjaan LM 1 dan LM 2</title>

<style>
:root {
    --primary-color: #00ff00;
}

body {
    margin: 0;
    background: #000;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    touch-action: none;
}

.camera-wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    /* Transisi dihapus agar zoom terasa instan dan responsif */
}

/* Watermark Real-time */
#timestamp {
    position: absolute;
    top: 50px;
    left: 20px;
    color: #fff;
    font-size: 12px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    z-index: 2;
    pointer-events: none;
    line-height: 1.4;
    background: transparent;
    padding: 5px;
    border-radius: 5px;
}

/* Zoom Slider */
.zoom-container {
    position: absolute;
    bottom: 240px; 
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 300px;
    background: rgba(40, 40, 40, 0.6);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 3;
    border: 1px solid rgba(255,255,255,0.1);
}

.zoom-icon {
    color: white;
    font-size: 13px;
    font-weight: bold;
}

input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    background: rgba(255, 255, 255, 0.2);
    height: 4px;
    border-radius: 2px;
    outline: none;
}

input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: #fff;
    border: 2px solid var(--primary-color);
    border-radius: 50%;
    cursor: pointer;
}

/* BOTTOM BAR */
.bottom-bar {
    position: absolute;
    bottom: 90px; 
    width: 90%;
    left: 5%;
    height: 100px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(15px);
    border-radius: 50px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 3;
    border: 1px solid rgba(255,255,255,0.1);
}

.shutter-btn {
    width: 75px;
    height: 75px;
    background: #fff;
    border-radius: 50%;
    border: 5px solid rgba(255,255,255,0.3);
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.shutter-btn:active {
    transform: scale(0.9);
}

.side-btn {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    border: none;
}

.gallery-preview {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #222;
    background-size: cover;
    background-position: center;
    border: 2px solid rgba(255,255,255,0.4);
}

/* Focus Ring */
#focusRing {
    position: absolute;
    width: 65px;
    height: 65px;
    border: 2px solid yellow;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    display: none;
    z-index: 10;
}

/* Preview Modal */
#previewContainer {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

#previewImage {
    max-width: 100%;
    max-height: 75vh;
}

.preview-actions {
    margin-top: 25px;
    display: flex;
    gap: 15px;
}

.action-btn {
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="camera-wrapper" onclick="handleFocus(event)">
    <video id="video" autoplay playsinline></video>
    <div id="focusRing"></div>

    <div id="timestamp">
        <span style="color:yellow; font-weight:bold; font-size: 14px;">Pekerjaan LM 1 dan LM 2 PBN</span><br>
        <span id="liveData">Mencari Lokasi & GPS...</span>
    </div>

    <div class="zoom-container">
        <span class="zoom-icon">1x</span>
        <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1">
        <span class="zoom-icon">5x</span>
    </div>

    <div class="bottom-bar">
        <div class="gallery-preview" id="galleryThumb" onclick="tutupPreview(false)"></div>
        <button class="shutter-btn" onclick="ambilFoto()"></button>
        <button class="side-btn" onclick="balikKamera()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M7 7h10v3l4-4-4-4v3H5c-1.1 0-2 .9-2 2v7h2V7zm10 10H7v-3l-4 4 4 4v-3h12c1.1 0 2-.9 2-2V9h-2v7z"/></svg>
        </button>
    </div>
</div>

<div id="previewContainer">
    <img id="previewImage">
    <div class="preview-actions">
        <button class="action-btn" style="background:var(--primary-color); color:#000;" onclick="downloadFoto()">SIMPAN HD</button>
        <button class="action-btn" style="background:#333; color:#fff;" onclick="tutupPreview(true)">BATAL</button>
    </div>
</div>

<script>
let latitude = "-";
let longitude = "-";
let alamat = "Mencari lokasi...";
let fotoDataURL = "";
let currentStream = null;
let currentFacingMode = "environment";

const video = document.getElementById("video");
const liveData = document.getElementById("liveData");
const focusRing = document.getElementById("focusRing");
const zoomSlider = document.getElementById("zoomSlider");

async function mulaiKamera() {
    // Stop stream sebelumnya jika ada
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    const constraints = {
        video: {
            facingMode: currentFacingMode,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
    };

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        
        // Reset zoom visual saat ganti kamera
        video.style.transform = `scale(${zoomSlider.value})`;
    } catch (err) {
        console.error("Error akses kamera: ", err);
        alert("Gagal mengakses kamera. Pastikan izin diberikan.");
    }
}

// Event listener zoom
zoomSlider.addEventListener("input", function() {
    video.style.transform = `scale(${this.value})`;
});

function balikKamera() {
    // Toggle kamera
    currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
    // Reset slider ke 1x agar tidak pusing saat pindah kamera
    zoomSlider.value = 1;
    mulaiKamera();
}

function handleFocus(e) {
    // Jangan munculkan focus ring jika klik slider atau tombol
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest('.bottom-bar')) return;
    
    focusRing.style.left = e.clientX + 'px';
    focusRing.style.top = e.clientY + 'px';
    focusRing.style.display = 'block';
    setTimeout(() => focusRing.style.display = 'none', 800);
}

// GPS Tracking
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(p => {
        latitude = p.coords.latitude.toFixed(7);
        longitude = p.coords.longitude.toFixed(7);
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
            .then(r => r.json())
            .then(d => {
                alamat = d.display_name || "Alamat tidak ditemukan";
            }).catch(() => {
                alamat = "Gagal memuat alamat (Masalah koneksi)";
            });
    }, err => {
        alamat = "Izin GPS ditolak/tidak aktif";
    }, { enableHighAccuracy: true });
}

// Update clock & overlay UI
setInterval(() => {
    const now = new Date();
    const tgl = now.toLocaleDateString('id-ID', { day:'2-digit', month:'2-digit', year:'numeric' });
    const jam = now.toLocaleTimeString('id-ID');
    liveData.innerHTML = `📅 ${tgl} | ⏰ ${jam}<br>📍 ${alamat}<br>🌍 ${latitude}, ${longitude}`;
}, 1000);

function ambilFoto() {
    const canvas = document.createElement("canvas");
    // Gunakan resolusi asli video, bukan ukuran tampilan CSS
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");

    // Perhitungan zoom manual pada canvas
    const zoom = parseFloat(zoomSlider.value);
    const sw = canvas.width / zoom;
    const sh = canvas.height / zoom;
    const sx = (canvas.width - sw) / 2;
    const sy = (canvas.height - sh) / 2;

    // Gambar frame video ke canvas dengan zoom yang sesuai
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

    // Styling Watermark
    const fs = Math.max(24, Math.floor(canvas.height * 0.025));
    ctx.font = `bold ${fs}px Arial`;
    const maxWidth = canvas.width * 0.8;
    
    // Siapkan data teks
    const lines = ["Pekerjaan LM 1 dan LM 2 PBN"];
    const now = new Date();
    const tglJam = `📅 ${now.toLocaleDateString('id-ID')} | ⏰ ${now.toLocaleTimeString('id-ID')}`;
    const locArr = [`📍 ${alamat}`, `🌍 ${latitude}, ${longitude}`];
    
    // Fungsi bungkus teks (word wrap)
    function wrapText(text, list) {
        let words = text.split(' '), cur = '';
        words.forEach(w => {
            if (ctx.measureText(cur + w).width > maxWidth) {
                list.push(cur.trim());
                cur = w + ' ';
            } else cur += w + ' ';
        });
        list.push(cur.trim());
    }

    wrapText(tglJam, lines);
    locArr.forEach(l => wrapText(l, lines));

    // Gambar background watermark hitam transparan
    const lineHeight = fs * 1.5;
    const bgH = (lines.length * lineHeight) + 40;
    const bgY = canvas.height - bgH - 60;

    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(40, bgY, maxWidth + 60, bgH);

    // Render Teks
    ctx.textBaseline = "top";
    lines.forEach((l, i) => {
        ctx.fillStyle = (i === 0) ? "yellow" : "#00ff00";
        if(i === 0) ctx.font = `bold ${fs + 10}px Arial`;
        else ctx.font = `bold ${fs}px Arial`;
        
        ctx.fillText(l, 60, bgY + 20 + (i * lineHeight));
    });

    fotoDataURL = canvas.toDataURL("image/jpeg", 0.9);
    document.getElementById("previewImage").src = fotoDataURL;
    document.getElementById("galleryThumb").style.backgroundImage = `url(${fotoDataURL})`;
    document.getElementById("previewContainer").style.display = "flex";
}

function downloadFoto() {
    const a = document.createElement("a");
    a.href = fotoDataURL;
    a.download = `PBN_HD_${Date.now()}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function tutupPreview(isBatal) {
    if(!isBatal && !fotoDataURL) return;
    document.getElementById("previewContainer").style.display = "none";
}

// Jalankan kamera pertama kali
mulaiKamera();
</script>
</body>
</html>
